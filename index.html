<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chauffeurs — Arriving</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --obsidian:#050505;--surface:#0A0A0A;--surface-2:#0D0D0D;--white:#FFFFFF;
  --white-dim:rgba(255,255,255,0.12);--white-ghost:rgba(255,255,255,0.04);
  --gold:#C9A84C;--gold-bright:#FFD700;--silver:#C0C0C0;--dim:#444444;
  --gold-silver:linear-gradient(90deg,#C9A84C 0%,#E8E8E8 14%,#FFD700 28%,#C0C0C0 42%,#D4AF37 56%,#F5F5F5 70%,#C9A84C 84%,#B8B8B8 100%);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--obsidian);color:var(--white);font-family:'Space Grotesk',sans-serif;font-weight:400;cursor:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#cursor{position:fixed;width:22px;height:22px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s}
#cursor::before,#cursor::after{content:'';position:absolute;background:rgba(255,255,255,.9)}
#cursor::before{width:1px;height:100%;left:50%;top:0;transform:translateX(-50%)}
#cursor::after{width:100%;height:1px;top:50%;left:0;transform:translateY(-50%)}
#cursor.hovering{width:40px;height:40px}
#cursor-dot{position:fixed;width:3px;height:3px;background:var(--white);border-radius:50%;pointer-events:none;z-index:10000;transform:translate(-50%,-50%)}
.video-wrap{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;background:#000}
#introVideo{width:100%;height:100%;object-fit:cover}
.vignette{position:fixed;inset:0;z-index:10;pointer-events:none;background:radial-gradient(ellipse at center,transparent 25%,rgba(5,5,5,.45) 70%,rgba(5,5,5,.92) 100%)}
.film-grain{position:fixed;inset:-50%;z-index:11;pointer-events:none;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");animation:grain .35s steps(3) infinite;mix-blend-mode:overlay}
@keyframes grain{0%{transform:translate(0,0)}33%{transform:translate(3px,-3px)}66%{transform:translate(-3px,2px)}100%{transform:translate(0,0)}}
.scan-lines{position:fixed;inset:0;z-index:12;pointer-events:none;background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.012) 3px,rgba(255,255,255,.012) 4px)}
.light-leak{position:fixed;top:-50vh;left:-50vw;width:200vw;height:200vh;z-index:9;pointer-events:none;background:conic-gradient(from 45deg at 30% 30%,transparent 0deg,rgba(123,47,255,.018) 30deg,rgba(0,245,255,.012) 70deg,transparent 100deg,transparent 200deg,rgba(255,46,149,.015) 250deg,rgba(255,215,0,.01) 290deg,transparent 360deg);animation:lightLeakMove 22s ease-in-out infinite alternate}
@keyframes lightLeakMove{0%{transform:translate(0,0) rotate(0deg) scale(1)}33%{transform:translate(5vw,-5vh) rotate(8deg) scale(1.05)}66%{transform:translate(-8vw,3vh) rotate(-6deg) scale(.98)}100%{transform:translate(3vw,7vh) rotate(12deg) scale(1.03)}}
.letterbox{position:fixed;left:0;right:0;background:#000;z-index:13;pointer-events:none;transition:height 1s cubic-bezier(.4,0,.2,1)}
.letterbox.top{top:0;height:5vh}
.letterbox.bottom{bottom:0;height:5vh}
.fog-container{position:fixed;inset:0;z-index:8;pointer-events:none;overflow:hidden}
.fog-layer{position:absolute;border-radius:50%;filter:blur(60px);opacity:0;will-change:transform,opacity}
.fog-1{bottom:-20%;left:-10%;width:80%;height:70vh;background:radial-gradient(ellipse at 50% 80%,rgba(255,255,255,.07) 0%,rgba(255,255,255,.035) 30%,transparent 65%);animation:fogDrift1 12s ease-in-out infinite alternate}
.fog-2{bottom:-15%;right:-10%;width:70%;height:60vh;background:radial-gradient(ellipse at 50% 70%,rgba(255,215,0,.04) 0%,rgba(201,168,76,.02) 35%,transparent 65%);animation:fogDrift2 16s ease-in-out infinite alternate}
.fog-3{bottom:-25%;left:20%;width:60%;height:55vh;background:radial-gradient(ellipse at 50% 75%,rgba(255,255,255,.05) 0%,rgba(255,255,255,.025) 30%,transparent 60%);animation:fogDrift3 10s ease-in-out infinite alternate}
.fog-4{bottom:-10%;left:40%;width:50%;height:45vh;background:radial-gradient(ellipse at 50% 65%,rgba(123,47,255,.03) 0%,rgba(0,245,255,.02) 40%,transparent 60%);animation:fogDrift1 14s ease-in-out infinite alternate-reverse}
@keyframes fogDrift1{0%{transform:translate(0,0) scale(1);opacity:.5}50%{transform:translate(8vw,-4vh) scale(1.1);opacity:.7}100%{transform:translate(-6vw,3vh) scale(.95);opacity:.4}}
@keyframes fogDrift2{0%{transform:translate(0,0) scale(1);opacity:.4}50%{transform:translate(-8vw,5vh) scale(1.15);opacity:.6}100%{transform:translate(5vw,-3vh) scale(.9);opacity:.3}}
@keyframes fogDrift3{0%{transform:translate(0,0) scale(1);opacity:.6}50%{transform:translate(6vw,4vh) scale(1.08);opacity:.8}100%{transform:translate(-4vw,-2vh) scale(.92);opacity:.5}}
.fog-wisp{position:absolute;border-radius:50%;background:rgba(255,255,255,.04);filter:blur(20px);will-change:transform,opacity}
.fog-wisp:nth-child(5){bottom:5%;left:15%;width:120px;height:60px;animation:wispFloat 8s ease-in-out infinite}
.fog-wisp:nth-child(6){bottom:8%;left:45%;width:90px;height:45px;animation:wispFloat 10s ease-in-out infinite 1s}
.fog-wisp:nth-child(7){bottom:3%;left:70%;width:150px;height:70px;animation:wispFloat 12s ease-in-out infinite 2s}
.fog-wisp:nth-child(8){bottom:12%;left:30%;width:80px;height:40px;animation:wispFloat 9s ease-in-out infinite .5s}
.fog-wisp:nth-child(9){bottom:6%;left:85%;width:100px;height:50px;animation:wispFloat 11s ease-in-out infinite 1.5s}
@keyframes wispFloat{0%{transform:translate(0,0) scale(1);opacity:0}20%{opacity:.6}50%{transform:translate(30px,-40px) scale(1.3);opacity:.4}80%{opacity:.2}100%{transform:translate(60px,-80px) scale(1.5);opacity:0}}

/* GLOW EFFECT — behind buttons only, does NOT change button styling */
.glow-effect{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;border-radius:inherit;will-change:transform,opacity;backface-visibility:hidden}
.glow-effect.breathe{filter:blur(14px);opacity:.5;animation:glowBreathe 5s ease-in-out infinite}
@keyframes glowBreathe{
  0%,100%{background:radial-gradient(circle at 50% 50%,#C9A84C 0%,transparent 100%);transform:scale(1);opacity:.4}
  33%{background:radial-gradient(circle at 50% 50%,#FFD700 0%,transparent 100%);transform:scale(1.05);opacity:.65}
  66%{background:radial-gradient(circle at 50% 50%,#C0C0C0 0%,transparent 100%);transform:scale(1.03);opacity:.55}
}
.glow-effect.colorShift{filter:blur(10px);opacity:0;background:conic-gradient(from 0deg,#C9A84C,#E8E8E8,#FFD700,#C0C0C0,#D4AF37,#F5F5F5,#C9A84C);animation:glowColorShift 4s linear infinite;transition:opacity .5s ease}
@keyframes glowColorShift{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.04)}100%{transform:rotate(360deg) scale(1)}}

.center-stack{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:0 2rem}
.logo-wrap{position:relative;opacity:0;transform:scale(.85);filter:blur(20px);transition:opacity 1.4s cubic-bezier(.76,0,.24,1),transform 1.4s cubic-bezier(.76,0,.24,1),filter 1.4s cubic-bezier(.76,0,.24,1)}
.logo-wrap.revealed{opacity:1;transform:scale(1);filter:blur(0)}
.logo-wrap::before{content:'';position:absolute;inset:-30%;background:radial-gradient(ellipse at center,rgba(201,168,76,.08) 0%,rgba(201,168,76,.03) 30%,transparent 60%);z-index:-1;animation:logoGlow 4s ease-in-out infinite alternate}
@keyframes logoGlow{0%{opacity:.6;transform:scale(1)}100%{opacity:1;transform:scale(1.08)}}
.tc-logo{width:clamp(120px,18vw,200px);height:auto;display:block;mix-blend-mode:screen;filter:drop-shadow(0 0 20px rgba(201,168,76,.15))}
.logo-wrap.glitch{animation:logoChroma .6s ease-in-out}
@keyframes logoChroma{0%,100%{filter:blur(0)}20%{filter:blur(0) drop-shadow(-4px 0 0 rgba(255,0,60,.5)) drop-shadow(4px 0 0 rgba(0,245,255,.5))}40%{filter:blur(0) drop-shadow(3px 0 0 rgba(255,0,60,.3)) drop-shadow(-3px 0 0 rgba(0,245,255,.3))}60%{filter:blur(0) drop-shadow(-2px 0 0 rgba(255,0,60,.2)) drop-shadow(2px 0 0 rgba(0,245,255,.2))}}
.brand-name{margin-top:1.8rem;font-size:clamp(.8rem,1.4vw,1.05rem);font-weight:500;letter-spacing:.42em;text-transform:uppercase;color:rgba(255,255,255,.82);opacity:0;transform:translateY(20px);transition:opacity 1s ease .5s,transform 1s ease .5s;text-indent:.42em}
.brand-name.revealed{opacity:1;transform:translateY(0)}
.brand-name .accent-gold{color:var(--gold)}
.brand-tagline{margin-top:.6rem;font-size:.6rem;font-weight:300;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.3);opacity:0;transform:translateY(12px);transition:opacity .8s ease .8s,transform .8s ease .8s;text-indent:.32em}
.brand-tagline.revealed{opacity:1;transform:translateY(0)}

/* Breathing gold-silver metallic accent (replaces rainbow) */
.brand-spectrum{width:0;height:2px;margin-top:1.4rem;background:var(--gold-silver);background-size:300% 100%;border-radius:1px;box-shadow:0 0 8px rgba(201,168,76,.5),0 0 20px rgba(192,192,192,.25),0 0 40px rgba(201,168,76,.12);transition:width 1.2s cubic-bezier(.76,0,.24,1) 1s;animation:goldSilverBreath 6s ease-in-out infinite}
.brand-spectrum.drawn{width:240px}
@keyframes goldSilverBreath{0%,100%{background-position:0% 50%;filter:brightness(1)}50%{background-position:100% 50%;filter:brightness(1.3)}}

.loading-section{margin-top:3rem;display:flex;flex-direction:column;align-items:center;gap:.8rem;opacity:0;transform:translateY(16px);transition:opacity .8s ease 1.2s,transform .8s ease 1.2s}
.loading-section.revealed{opacity:1;transform:translateY(0)}
.loading-section.fade-out{opacity:0;transform:translateY(-10px);transition:opacity .6s ease,transform .6s ease}
.loading-track{width:260px;height:2px;background:rgba(255,255,255,.08);position:relative;overflow:hidden}
.loading-fill{position:absolute;top:0;left:0;height:100%;width:0;background:var(--gold-silver);background-size:300% 100%;box-shadow:0 0 8px rgba(201,168,76,.5),0 0 18px rgba(192,192,192,.3);animation:goldSilverBreath 6s ease-in-out infinite;transition:width .3s ease-out}
.loading-meta{display:flex;align-items:center;gap:1rem;font-size:.6rem;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.32)}
.loading-percent{color:rgba(255,255,255,.55);font-variant-numeric:tabular-nums;min-width:2.5em;text-align:right}
.loading-divider{width:1px;height:10px;background:rgba(255,255,255,.12)}
.loading-label{transition:color .4s,opacity .4s}
.loading-label.ready{color:var(--gold);opacity:1}

/* ENTER BUTTON — GlowEffect behind, button styling unchanged */
.enter-btn-wrap{position:relative;margin-top:2.5rem;opacity:0;transform:translateY(20px);pointer-events:none;transition:opacity .9s cubic-bezier(.76,0,.24,1),transform .9s cubic-bezier(.76,0,.24,1);display:inline-block}
.enter-btn-wrap.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.enter-btn-wrap .glow-effect{inset:-6px;border-radius:6px}
.enter-btn-wrap:hover .glow-effect.colorShift{opacity:.6}
.enter-btn{position:relative;z-index:1;font-family:'Space Grotesk',sans-serif;font-size:.74rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--white);background:transparent;border:1px solid rgba(201,168,76,.35);padding:.95rem 3.2rem;cursor:none;transition:all .4s cubic-bezier(.76,0,.24,1);text-decoration:none;display:inline-block;overflow:hidden;text-indent:.28em}
.enter-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(201,168,76,.12),transparent);transition:left .6s ease}
.enter-btn:hover{border-color:rgba(201,168,76,.7);background:rgba(201,168,76,.04);box-shadow:0 0 24px rgba(201,168,76,.15),inset 0 0 20px rgba(201,168,76,.05);transform:translateY(-2px)}
.enter-btn:hover::before{left:100%}

/* SKIP BUTTON — GlowEffect behind, button styling unchanged */
.skip-btn-wrap{position:fixed;bottom:2.5rem;right:2.5rem;z-index:25;display:inline-block}
.skip-btn-wrap .glow-effect{inset:-4px;border-radius:4px;opacity:.25;filter:blur(10px)}
.skip-btn-wrap:hover .glow-effect.breathe{opacity:.5}
.skip-btn{position:relative;z-index:1;background:none;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.3);font-family:'Space Grotesk',sans-serif;font-size:.65rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;padding:.55rem 1.3rem;cursor:none;transition:all .3s}
.skip-btn:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.6);background:rgba(255,255,255,.03)}

.unmute-prompt{position:fixed;bottom:2.5rem;left:2.5rem;z-index:25;font-size:.6rem;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.25);pointer-events:none;opacity:0;transition:opacity .5s;display:flex;align-items:center;gap:.5rem}
.unmute-prompt.visible{opacity:1}
.unmute-prompt .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulseDot 1.6s ease-in-out infinite}
@keyframes pulseDot{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
.corner-marker{position:fixed;width:24px;height:24px;z-index:15;pointer-events:none;opacity:0;transition:opacity .8s ease 1.5s}
.corner-marker.revealed{opacity:.3}
.corner-marker::before,.corner-marker::after{content:'';position:absolute;background:rgba(255,255,255,.4)}
.corner-marker::before{width:100%;height:1px}
.corner-marker::after{width:1px;height:100%}
.cm-tl{top:2.5rem;left:2.5rem}.cm-tl::before{top:0;left:0}.cm-tl::after{top:0;left:0}
.cm-tr{top:2.5rem;right:2.5rem}.cm-tr::before{top:0;right:0}.cm-tr::after{top:0;right:0}
.cm-bl{bottom:2.5rem;left:2.5rem}.cm-bl::before{bottom:0;left:0}.cm-bl::after{bottom:0;left:0}
.cm-br{bottom:2.5rem;right:2.5rem}.cm-br::before{bottom:0;right:0}.cm-br::after{bottom:0;right:0}
.fade-to-black{position:fixed;inset:0;z-index:100;background:var(--obsidian);opacity:0;pointer-events:none;transition:opacity 1s ease}
.fade-to-black.active{opacity:1;pointer-events:auto}
@media(max-width:768px){
  .skip-btn-wrap{bottom:1.5rem;right:1.5rem}.unmute-prompt{bottom:1.5rem;left:1.5rem}
  .letterbox.top,.letterbox.bottom{height:4vh}.enter-btn{padding:.85rem 2.4rem;font-size:.68rem}
  .loading-track{width:200px}.corner-marker{width:16px;height:16px}
  .cm-tl,.cm-bl{left:1.5rem}.cm-tr,.cm-br{right:1.5rem}.cm-tl,.cm-tr{top:1.5rem}.cm-bl,.cm-br{bottom:1.5rem}
  body{cursor:auto}#cursor,#cursor-dot{display:none}
}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-dot"></div>
<div class="video-wrap">
  <video id="introVideo" preload="auto" playsinline loop poster="https://cdn.higgsfield.ai/user_3ECGVFZTaGiKHb6MBbVpPbvllLv/hf_20260713_224830_bd35d856-b927-4f15-af46-5536f3fc4a22_thumbnail.webp">
    <source src="https://d8j0ntlcm91z4.cloudfront.net/user_3ECGVFZTaGiKHb6MBbVpPbvllLv/hf_20260713_224830_bd35d856-b927-4f15-af46-5536f3fc4a22.mp4" type="video/mp4">
  </video>
</div>
<div class="light-leak"></div>
<div class="fog-container">
  <div class="fog-layer fog-1"></div><div class="fog-layer fog-2"></div><div class="fog-layer fog-3"></div><div class="fog-layer fog-4"></div>
  <div class="fog-wisp"></div><div class="fog-wisp"></div><div class="fog-wisp"></div><div class="fog-wisp"></div><div class="fog-wisp"></div>
</div>
<div class="vignette"></div>
<div class="scan-lines"></div>
<div class="film-grain"></div>
<div class="letterbox top"></div>
<div class="letterbox bottom"></div>
<div class="corner-marker cm-tl"></div>
<div class="corner-marker cm-tr"></div>
<div class="corner-marker cm-bl"></div>
<div class="corner-marker cm-br"></div>
<div class="center-stack">
  <div class="logo-wrap" id="logoWrap">
    <img src="https://d8j0ntlcm91z4.cloudfront.net/user_3ECGVFZTaGiKHb6MBbVpPbvllLv/hf_20260701_084615_43cb1099-fb41-4d47-baee-e11e688d5c4b.png" alt="TC" class="tc-logo" id="tcLogo">
  </div>
  <div class="brand-name" id="brandName">THE <span class="accent-gold">CHAUFFEURS</span></div>
  <div class="brand-tagline" id="brandTagline">Luxury Transportation &middot; Las Vegas</div>
  <div class="brand-spectrum" id="brandSpectrum"></div>
  <div class="loading-section" id="loadingSection">
    <div class="loading-track"><div class="loading-fill" id="loadingFill"></div></div>
    <div class="loading-meta">
      <span class="loading-label" id="loadingLabel">Preparing your arrival</span>
      <span class="loading-divider"></span>
      <span class="loading-percent" id="loadingPercent">0%</span>
    </div>
  </div>
  <div class="enter-btn-wrap" id="enterBtnWrap">
    <div class="glow-effect breathe"></div>
    <div class="glow-effect colorShift"></div>
    <a href="home.html" class="enter-btn" id="enterBtn">Enter Site</a>
  </div>
</div>
<div class="skip-btn-wrap" id="skipBtnWrap">
  <div class="glow-effect breathe"></div>
  <button class="skip-btn" id="skipBtn">Skip Intro &rarr;</button>
</div>
<div class="unmute-prompt" id="unmutePrompt"><span class="pulse-dot"></span> Click to enable sound</div>
<div class="fade-to-black" id="fadeToBlack"></div>
<script>
const video=document.getElementById('introVideo'),skipBtn=document.getElementById('skipBtn'),unmuteP=document.getElementById('unmutePrompt'),logoWrap=document.getElementById('logoWrap'),brandName=document.getElementById('brandName'),brandTag=document.getElementById('brandTagline'),brandSpec=document.getElementById('brandSpectrum'),loadSect=document.getElementById('loadingSection'),loadFill=document.getElementById('loadingFill'),loadPct=document.getElementById('loadingPercent'),loadLabel=document.getElementById('loadingLabel'),enterWrap=document.getElementById('enterBtnWrap'),enterBtn=document.getElementById('enterBtn'),fadeBlack=document.getElementById('fadeToBlack'),corners=document.querySelectorAll('.corner-marker'),cursor=document.getElementById('cursor'),cursorDot=document.getElementById('cursor-dot');
let finished=false,progress=0;
document.addEventListener('mousemove',e=>{cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';cursorDot.style.left=e.clientX+'px';cursorDot.style.top=e.clientY+'px'});
document.querySelectorAll('a,button').forEach(el=>{el.addEventListener('mouseenter',()=>cursor.classList.add('hovering'));el.addEventListener('mouseleave',()=>cursor.classList.remove('hovering'))});
function revealSequence(){
  setTimeout(()=>{logoWrap.classList.add('revealed');logoWrap.classList.add('glitch');setTimeout(()=>logoWrap.classList.remove('glitch'),700)},200);
  setTimeout(()=>brandName.classList.add('revealed'),800);
  setTimeout(()=>brandTag.classList.add('revealed'),1100);
  setTimeout(()=>brandSpec.classList.add('drawn'),1400);
  setTimeout(()=>loadSect.classList.add('revealed'),1600);
  setTimeout(()=>corners.forEach(c=>c.classList.add('revealed')),1800);
}
function startLoading(){
  const minDuration=4200,startTime=Date.now();
  function tick(){
    const elapsed=Date.now()-startTime,timeRatio=Math.min(elapsed/minDuration,1);
    let bufferRatio=0;
    if(video.buffered.length>0&&video.duration>0)bufferRatio=video.buffered.end(0)/video.duration;
    progress=Math.min(timeRatio,Math.max(bufferRatio,timeRatio*.85))*100;
    if(timeRatio>.85)progress=Math.max(progress,85+(timeRatio-.85)/.15*15);
    progress=Math.min(progress,100);
    loadFill.style.width=progress+'%';loadPct.textContent=Math.floor(progress)+'%';
    if(progress>=100){loadLabel.textContent='Ready';loadLabel.classList.add('ready');setTimeout(showEnter,600)}
    else requestAnimationFrame(tick);
  }
  tick();
}
function showEnter(){if(finished)return;finished=true;loadSect.classList.add('fade-out');setTimeout(()=>{loadSect.style.display='none';enterWrap.classList.add('visible')},500)}
video.muted=true;video.play().then(()=>{unmuteP.classList.add('visible');setTimeout(()=>unmuteP.classList.remove('visible'),5000)}).catch(()=>{document.addEventListener('click',()=>{video.muted=true;video.play().catch(()=>{})},{once:true})});
document.addEventListener('click',()=>{if(video.muted){video.muted=false;unmuteP.classList.remove('visible')}});
skipBtn.addEventListener('click',()=>{video.pause();progress=100;loadFill.style.width='100%';loadPct.textContent='100%';loadLabel.textContent='Ready';loadLabel.classList.add('ready');setTimeout(showEnter,300)});
document.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '||e.key==='Escape'){if(!finished){e.preventDefault();skipBtn.click()}else if(enterWrap.classList.contains('visible')){e.preventDefault();enterBtn.click()}}});
enterBtn.addEventListener('click',e=>{e.preventDefault();fadeBlack.classList.add('active');setTimeout(()=>{window.location.href=enterBtn.getAttribute('href')},1000)});
